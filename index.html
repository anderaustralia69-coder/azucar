<!-- ====== CONTACTO (MODIFICADO SOLO PARA FORMSPREE) ====== -->
<section class="contact" id="contacto">
  <div class="contact-box">
    <p class="section-tag">Cotizaciones</p>
    <h2>¿Listo para comprar?</h2>
    <p class="contact-desc">
      Rellena el formulario y un asesor te contactará en menos de 24 horas laborables con una oferta a medida según tu volumen, destino y periodicidad.
    </p>

    <form class="form-grid" id="contactForm"
          action="https://formspree.io/f/xkovlobe"
          method="POST">

      <div class="form-row">
        <input type="text" id="fname" name="nombre" placeholder="Nombre completo *" required>
        <input type="text" id="company" name="empresa" placeholder="Empresa / Razón social">
      </div>

      <div class="form-row">
        <input type="email" id="email" name="email" placeholder="Correo electrónico *" required>
        <input type="tel" id="phone" name="telefono" placeholder="Teléfono / WhatsApp">
      </div>

      <select id="product" name="producto" required>
        <option value="" disabled selected>Producto de interés *</option>
        <option>Azúcar Blanco Estándar</option>
        <option>Azúcar Refinada Extra</option>
        <option>Azúcar Morena de Caña</option>
        <option>Azúcar Ecológica BIO</option>
        <option>Varios productos</option>
      </select>

      <div class="form-row">
        <input type="number" id="volume" name="volumen_mensual_kg" placeholder="Volumen mensual (kg) *" min="1" required>
        <select id="frequency" name="frecuencia">
          <option value="" disabled selected>Frecuencia de pedido</option>
          <option>Pedido único</option>
          <option>Mensual</option>
          <option>Quincenal</option>
          <option>Semanal</option>
        </select>
      </div>

      <textarea id="notes" name="mensaje"
        placeholder="¿Algún requerimiento especial? (Provincia de entrega, certificaciones, embalaje...)"></textarea>

      <!-- Anti-spam invisible -->
      <input type="text" name="_gotcha" style="display:none">

      <button class="submit-btn" id="submitBtn" type="submit">
        Enviar solicitud de cotización →
      </button>

    </form>
  </div>
</section>

<!-- TODO TU FOOTER ORIGINAL EXACTAMENTE IGUAL -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script>

/* ===== TICKER ORIGINAL ===== */
/* ===== CHART ORIGINAL ===== */
/* ===== goContact ORIGINAL ===== */
/* ===== Smooth scroll ORIGINAL ===== */


/* ===== NUEVA INTEGRACIÓN FORMSPREE ===== */

document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  const form = e.target;

  const fname   = document.getElementById('fname').value.trim();
  const email   = document.getElementById('email').value.trim();
  const volume  = document.getElementById('volume').value.trim();
  const product = document.getElementById('product').value;

  if (!fname) {
    alert('Por favor, introduce tu nombre completo.');
    return;
  }

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert('Por favor, introduce un correo electrónico válido.');
    return;
  }

  if (!product) {
    alert('Por favor, selecciona un producto.');
    return;
  }

  if (!volume || Number(volume) < 1) {
    alert('Por favor, indica el volumen mensual en kg.');
    return;
  }

  btn.textContent = 'Enviando…';
  btn.disabled = true;

  try {
    const response = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      btn.textContent = '✅ Solicitud enviada — te contactamos en <24 h';
      btn.style.background = '#4CAF50';
      btn.style.color = '#fff';
      form.reset();
    } else {
      alert('Hubo un error al enviar el formulario.');
      btn.textContent = 'Enviar solicitud de cotización →';
      btn.disabled = false;
    }

  } catch (error) {
    alert('Error de conexión. Inténtalo más tarde.');
    btn.textContent = 'Enviar solicitud de cotización →';
    btn.disabled = false;
  }
});

</script>
